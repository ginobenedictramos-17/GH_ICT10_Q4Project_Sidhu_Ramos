<!DOCTYPE html>
<html>
<head>
    <title>Grade 10 Emerald</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #145C9E, #1e3a8a);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        /* SECTIONS */
        .section {
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1, h2 {
            text-align: center;
        }

        /* PHOTOS */
        .photo-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .photo-card {
            text-align: center;
        }

        .photo-card img {
            width: 220px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .photo-card img:hover {
            transform: scale(1.08);
        }

        /* INPUTS */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background: #1976d2;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #145ca1;
        }

        #output, #graph {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #f1f5f9;
        }
    </style>
</head>

<body>

<div class="navbar">
    Grade 10 Emerald – Class Website
</div>

<!-- PHOTOS -->
<div class="section">
    <div class="container">
        <h1>📸 Memories</h1>

        <h3>Gurnoor & Gino</h3>
        <div class="photo-row">
            <div class="photo-card"><img src="images/IMG_6607.JPG"><p>Best duo</p></div>
            <div class="photo-card"><img src="images/IMG_6608.JPG"><p>Another moment</p></div>
        </div>

        <h3>Zest Fest</h3>
        <div class="photo-row">
            <div class="photo-card"><img src="images/IMG_6570.JPG"><p>Event day</p></div>
            <div class="photo-card"><img src="images/IMG_6636.JPG"><p>Fun times</p></div>
            <div class="photo-card"><img src="images/IMG_6619.JPG"><p>Class energy</p></div>
        </div>

        <h3>More Memories</h3>
        <div class="photo-row">
            <div class="photo-card"><img src="images/IMG_6611.JPG"><p>Random moment</p></div>
            <div class="photo-card"><img src="images/WIN_20251126_12_40_39_Pro.jpg"><p>Class vibes</p></div>
        </div>
    </div>
</div>

<!-- CLASSMATES -->
<div class="section">
    <div class="container">
        <h2>👥 Classmates</h2>

        <input id="name_input" placeholder="Name">
        <input id="section_input" placeholder="Section">
        <input id="subject_input" placeholder="Favorite Subject">

        <button py-click="add_classmate">Add Classmate</button>
        <button py-click="show_list">Show List</button>

        <div id="output"></div>
    </div>
</div>

<!-- ATTENDANCE -->
<div class="section">
    <div class="container">
        <h2>📊 Attendance Tracker</h2>

        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <input type="number" id="absentees" placeholder="Absentees">
        <button py-click="update_graph">Submit</button>

        <div id="graph"></div>
    </div>
</div>

<!-- PYTHON -->
<py-script src="classmates.py"></py-script>
<py-script src="attendance.py"></py-script>

</body>
</html>
