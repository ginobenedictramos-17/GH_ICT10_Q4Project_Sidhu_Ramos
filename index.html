<!DOCTYPE html>
<html>
<head>
    <title>Grade 10 Emerald</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #145C9E;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            background: #758173;
            padding: 15px;
        }

        .nav-links button {
            margin-left: 15px;
            padding: 8px 15px;
            border: none;
            background: #1976d2;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        /* SECTIONS */
        .section {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        .container {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            max-width: 900px;
            margin: auto;
        }

        .photo-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .photo-row img {
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Grade 10 Emerald</b></div>
    <div class="nav-links">
        <button onclick="showSection('photos')">Photos</button>
        <button onclick="showSection('classmates')">Classmates</button>
        <button onclick="showSection('attendance')">Attendance</button>
    </div>
</div>

<!-- PHOTOS -->
<div id="photos" class="section active">
    <div class="container">
        <h1>Memories</h1>

        <h2>Gurnoor and Gino</h2>
        <div class="photo-row">
            <img src="images/IMG_6607.JPG">
            <img src="images/IMG_6608.JPG">
        </div>

        <h2>Zest Fest</h2>
        <div class="photo-row">
            <img src="images/IMG_6570.JPG">
            <img src="images/IMG_6636.JPG">
            <img src="images/IMG_6619.JPG">
        </div>

        <h2>More</h2>
        <div class="photo-row">
            <img src="images/IMG_6611.JPG">
            <img src="images/WIN_20251126_12_40_39_Pro.jpg">
        </div>
    </div>
</div>

<!-- CLASSMATES -->
<div id="classmates" class="section">
    <div class="container">
        <h2>Classmates</h2>

        <input id="name_input" placeholder="Name"><br>
        <input id="section_input" placeholder="Section"><br>
        <input id="subject_input" placeholder="Favorite Subject"><br>

        <button py-click="add_classmate">Add</button>
        <button py-click="show_list">Show</button>

        <div id="output"></div>
    </div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section">
    <div class="container">
        <h2>Attendance</h2>

        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <input type="number" id="absentees">
        <button py-click="update_graph">Submit</button>

        <div id="graph"></div>
    </div>
</div>

<!-- LOAD BOTH PY FILES -->
<py-script src="classmates.py"></py-script>
<py-script src="attendance.py"></py-script>

<!-- JS FOR NAV -->
<script>
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
