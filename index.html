<!DOCTYPE html>
<html>
<head>
    <title>Grade 10 Emerald</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #145C9E, #1e3a8a);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 25px;
            backdrop-filter: blur(10px);
        }

        .nav-title {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links button {
            margin-left: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links button:hover,
        .active-btn {
            background: white;
            color: #145C9E;
        }

        /* SECTIONS */
        .section {
            display: none;
            padding: 30px;
        }

        .active {
            display: block;
        }

        /* CARD */
        .container {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* PHOTOS */
        .photo-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .photo-card {
            text-align: center;
        }

        .photo-card img {
            width: 220px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .photo-card img:hover {
            transform: scale(1.05);
        }

        /* INPUTS */
        input, select {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background: #1976d2;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #145ca1;
        }

        #output, #graph {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #f1f5f9;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-title">Grade 10 Emerald</div>
    <div class="nav-links">
        <button class="active-btn" onclick="showSection('photos', this)">Photos</button>
        <button onclick="showSection('classmates', this)">Classmates</button>
        <button onclick="showSection('attendance', this)">Attendance</button>
    </div>
</div>

<!-- PHOTOS -->
<div id="photos" class="section active">
    <div class="container">
        <h1>📸 Memories</h1>

        <h3>Gurnoor & Gino</h3>
        <div class="photo-row">
            <div class="photo-card">
                <img src="images/IMG_6607.JPG">
                <p>Best duo 😎</p>
            </div>
            <div class="photo-card">
                <img src="images/IMG_6608.JPG">
                <p>Another moment</p>
            </div>
        </div>

        <h3>Zest Fest</h3>
        <div class="photo-row">
            <div class="photo-card"><img src="images/IMG_6570.JPG"><p>Event day</p></div>
            <div class="photo-card"><img src="images/IMG_6636.JPG"><p>Fun times</p></div>
            <div class="photo-card"><img src="images/IMG_6619.JPG"><p>Class energy</p></div>
        </div>

        <h3>More Memories</h3>
        <div class="photo-row">
            <div class="photo-card"><img src="images/IMG_6611.JPG"><p>Random moment</p></div>
            <div class="photo-card"><img src="images/WIN_20251126_12_40_39_Pro.jpg"><p>Class vibes</p></div>
        </div>
    </div>
</div>

<!-- CLASSMATES -->
<div id="classmates" class="section">
    <div class="container">
        <h2>👥 Classmates</h2>

        <input id="name_input" placeholder="Name">
        <input id="section_input" placeholder="Section">
        <input id="subject_input" placeholder="Favorite Subject">

        <button py-click="add_classmate">Add</button>
        <button py-click="show_list">Show List</button>

        <div id="output"></div>
    </div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section">
    <div class="container">
        <h2>📊 Attendance Tracker</h2>

        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <input type="number" id="absentees" placeholder="Absentees">
        <button py-click="update_graph">Submit</button>

        <div id="graph"></div>
    </div>
</div>

<!-- PYTHON -->
<py-script src="classmates.py"></py-script>
<py-script src="attendance.py"></py-script>

<!-- NAV SCRIPT -->
<script>
function showSection(id, btn) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.querySelectorAll(".nav-links button").forEach(b => b.classList.remove("active-btn"));

    document.getElementById(id).classList.add("active");
    btn.classList.add("active-btn");
}
</script>

</body>
</html>
